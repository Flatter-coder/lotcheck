<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LotCheck" />

  <!-- SEO -->
  <title>LotCheck — Did you LotCheck it?</title>
  <meta name="description" content="Canada's car market intelligence platform. Track used car prices in real time across Canada. Deal scoring, EVAP rebates, Canadian Black Book estimates, and Alberta allocation tracker." />

  <!-- Open Graph -->
  <meta property="og:title" content="LotCheck" />
  <meta property="og:description" content="Did you LotCheck it? Canada's live car market intelligence." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lotcheck.ca" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[LotCheck] SW registered'))
          .catch(err => console.warn('[LotCheck] SW failed:', err));
      });
    }
  </script>
</body>
</html>
