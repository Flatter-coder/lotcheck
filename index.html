<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16a34a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LotCheck" />

  <!-- SEO -->
  <title>LotCheck — Did you LotCheck it?</title>
  <meta name="description" content="Canada's car market intelligence platform. Track used car prices in real time across Canada. Deal scoring, EVAP rebates, Canadian Black Book estimates, and dealer connect." />
  <meta name="keywords" content="used cars Canada, car prices, EVAP rebate, Canadian Black Book, car market intelligence, LotCheck, Alberta used cars, Calgary used cars" />
  <link rel="canonical" href="https://lotcheck.ca/" />

  <!-- Open Graph -->
  <meta property="og:title" content="LotCheck — Did you LotCheck it?" />
  <meta property="og:description" content="Canada's live car market intelligence. Real-time price history, Deal Score ratings, EVAP rebates, and Canadian Black Book estimates." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lotcheck.ca" />
  <meta property="og:image" content="https://lotcheck.ca/icons/icon-512.png" />
  <meta property="og:locale" content="en_CA" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="LotCheck — Did you LotCheck it?" />
  <meta name="twitter:description" content="Canada's car market intelligence platform." />
  <meta name="twitter:image" content="https://lotcheck.ca/icons/icon-192.png" />

  <!-- Favicon — tells Google what icon to show in search results -->
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="shortcut icon" href="/favicon.ico" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />

  <!-- Structured Data — helps Google understand what LotCheck is -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "LotCheck",
    "alternateName": "Did you LotCheck it?",
    "url": "https://lotcheck.ca",
    "logo": "https://lotcheck.ca/icons/icon-512.png",
    "description": "Canada's used car market intelligence platform. Track real-time prices across Canada, get Deal Score ratings, calculate EVAP federal rebates, and connect with dealers.",
    "applicationCategory": "AutomotiveApplication",
    "operatingSystem": "Web, iOS, Android",
    "browserRequirements": "Requires JavaScript",
    "offers": {
      "@type": "Offer",
      "price": "9.99",
      "priceCurrency": "CAD",
      "description": "LotCheck Pro — unlimited price history, Black Book, VIN history, and price alerts"
    },
    "areaServed": {
      "@type": "Country",
      "name": "Canada"
    },
    "inLanguage": "en-CA",
    "publisher": {
      "@type": "Organization",
      "name": "LotCheck",
      "url": "https://lotcheck.ca",
      "logo": "https://lotcheck.ca/icons/icon-512.png"
    }
  }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020617; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[LotCheck] SW registered'))
          .catch(err => console.warn('[LotCheck] SW failed:', err));
      });
    }
  </script>
</body>
</html>
