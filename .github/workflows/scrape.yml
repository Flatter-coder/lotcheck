name: LotCheck Daily Scrape + Verify
on:
  workflow_dispatch:
  # Scheduled daily cron ("0 13 * * *" -- 6am Calgary) removed 2026-07-07 on
  # Vic's explicit instruction to stop scraping Kijiji entirely. Kijiji's own
  # Terms of Use prohibit automated scraping without express written
  # permission -- confirmed directly against help.kijiji.ca/policies/
  # kijiji-terms-of-use. Removing just this cron line would only stop the
  # AUTOMATIC daily runs; workflow_dispatch (the manual "Run workflow"
  # button) is left in place so this file still shows up and stays
  # inspectable, but src/scraper.js itself now refuses to run at all (see
  # that file) -- so even an accidental manual trigger can't scrape Kijiji.
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm install @supabase/supabase-js apify-client ws
      - name: Step 1 — Scrape listings from Kijiji
        env:
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🍁 Scraping Canadian listings..."
          node src/scraper.js
      - name: Step 2 — Verify listings before publishing
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          echo "🔍 Running verification pipeline..."
          node src/verify.js
      - name: Summary
        if: success()
        run: echo "✅ Scrape + verify complete — $(date)"
      - name: On failure
        if: failure()
        run: echo "❌ Pipeline failed — check logs"
