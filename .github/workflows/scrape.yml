name: LotCheck Daily Scrape

on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install @supabase/supabase-js apify-client ws

      - name: Run LotCheck scraper
        env:
          APIFY_TOKEN:  ${{ secrets.APIFY_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: node src/scraper.js

      - name: Done
        if: success()
        run: echo "✅ LotCheck scrape complete"
